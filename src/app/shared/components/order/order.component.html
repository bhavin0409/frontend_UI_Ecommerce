<div class=" mt-5">

  <h3 class="fw-bold mb-4 text-center">Order Management 📦</h3>

  <div class="row g-4">

    <div class="col-lg-6" *ngFor="let order of orders">

      <div class="card shadow-lg border-0 rounded-4 p-3 order-card bg-dark ">

        <div class="d-flex justify-content-between align-items-center mb-2 ">
          <h5 class="fw-bold text-light">Order#{{ order.id }}</h5>

          <span class="badge"
                [ngClass]="getStatusClass(order.status)">
            {{ order.status }}
          </span>
        </div>

        <small class="text-light">
         {{ order.createdAt | date:'medium' }}
        </small>


        <div class="mt-3 box">

          <div *ngFor="let item of order.items"
               class="d-flex align-items-center mb-3 item-box bg-secondary text-light mx-3">

            <img 
              [src]="'https://localhost:7225' + item.imageUrl"
              class="item-img me-3"
            />

            <div class="flex-grow-1 text-light">
              <h6 class="mb-1 ">
                {{ item.productName || ('Product #' + item.productId) }}
              </h6>

              <small>
                ₹{{ item.price }} × {{ item.quantity }}
              </small>
            </div>
             <small>₹{{item.price * item.quantity}}</small>
          </div>

        </div>

        <div class="d-flex justify-content-between align-items-center mt-1 border-top pt-2">
          <strong class="text-light">Total:</strong>
          <h5 class="text-success">₹{{ order.totalAmount }}</h5>
        </div>

      </div>

    </div>

  </div>

</div>
