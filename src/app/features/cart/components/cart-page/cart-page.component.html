<div class="container-fluid p-5" id="cart-box">
    <h3 class="mb-4 fw-bold">🛒 Shopping Cart</h3>
    <ng-container *ngIf="cartItems?.[0]?.data?.items?.length > 0; else emptyCart">
        <div class="row g-4">
            <div class="col-lg-8">
                <div *ngFor="let item of cartItems[0].data.items">
                    <div class="card shadow-sm mb-3 bg-dark text-light">
                        <div class="card-body">
                            <div class="row align-items-center">
                                <div class="col-6 col-md-3">
                                    <img [src]="'https://localhost:7225'+item.productImg" class="img-fluid rounded"
                                        [width]="150" />
                                </div>

                                <div class="col-6 col-md-4">
                                    <h6 class="mb-1">{{ item.productName }}</h6>
                                    <small class="text-muted">₹{{item.price}}</small>
                                </div>

                                <div class="col-4 col-md-2">
                                    <div class="d-flex align-items-center gap-2">

                                        <button class="btn btn-sm btn-outline-light"
                                            (click)="updateQuantity(item.productId, item.quantity - 1)">
                                            -
                                        </button>

                                        <span>{{ item.quantity }}</span>

                                        <button class="btn btn-sm btn-outline-light"
                                            (click)="updateQuantity(item.productId, item.quantity + 1)">
                                            +
                                        </button>

                                    </div>
                                </div>

                                <div class="col-4 text-center col-md-2 fw-bold">
                                    ₹{{item.total}}
                                </div>

                                <div class="col-4 text-end col-md-1">
                                    <button class="btn btn-sm btn-danger" (click)="remove(item.productId)">✖</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="col-lg-4 ">
                <div class="card shadow-sm bg-dark text-light">
                    <div class="card-body ">
                        <h5 class="fw-bold mb-3">Order Summary</h5>

                        <div class="d-flex justify-content-between mb-2">
                            <span>Subtotal</span>
                            <span>₹{{cartItems[0].data.totalAmount}}</span>
                        </div>

                        <div class="d-flex justify-content-between mb-2">
                            <span>Shipping</span>
                            <span class="text-success fw-bold fs-6">Free</span>
                        </div>

                        <hr>

                        <div class="d-flex justify-content-between fw-bold fs-5 mb-3">
                            <span>Total</span>
                            <span>₹{{cartItems[0].data.totalAmount}}</span>
                        </div>

                        <button class="btn btn-success w-100" (click)="placeOrder()">Proceed to Checkout</button>
                    </div>
                </div>
            </div>
        </div>
    </ng-container>
</div>

<ng-template #emptyCart>
    <div class="text-center mt-5">
        <div class="alert alert-info">
            Your cart is empty
        </div>

        <div class="d-flex justify-content-center gap-3 mt-3">
            <a routerLink="/">
                <button class="btn btn-dark">Back to Home</button>
            </a>
            <a routerLink="/products">
                <button class="btn btn-success">Back to Shopping</button>
            </a>
        </div>
    </div>
</ng-template>
