<div class="container-fuild p-5" id="profile-box">
    <div class="row g-5 justify-content-center">

        <div class="col-lg-4 text-center">
            <ng-container *ngIf="user?.profileImage; else defaultImage">
                <img [src]=user.profileImage class="rounded-circle border border-3 border-primary mb-3" width="120">
            </ng-container>

            <ng-template #defaultImage>
                <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png"
                    class="rounded-circle border border-3 border-primary mb-3" width="120">
            </ng-template>
            <h3>{{user.userName}}</h3>
            <p class="text-light">{{user.email}}</p>
        </div>

        <div class="col-lg-6">
            <div class="row text-center mb-4" *ngIf="!isAdmin()">
                <!-- <div class="col-6">
                    <h5 id="ordersCount">0</h5>
                    <small class="text-muted">Orders</small>
                </div> -->
                <div class="col-6">
                    <h5 id="cartCount"></h5>
                    <h5 routerLink="/cart" class="text-muted">Cart</h5>
                </div>
            </div>

            <div class="d-grid gap-3">

                <button class="btn btn-outline-primary btn-lg" data-bs-toggle="modal"
                    data-bs-target="#editProfileModal">
                    ✏️ Edit Profile
                </button>

                <button class="btn btn-danger btn-lg" (click)="logout()">Logout</button>
            </div>
        </div>
        <div class="modal fade" id="editProfileModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content dark-modal">

                    <div class="modal-header border-0">
                        <h5 class="modal-title fw-semibold">Edit Profile</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body pt-0">
                        <form [formGroup]="editForm" (ngSubmit)="editProfile()">

                            <div class="mb-4">
                                <label class="form-label text-light">User Name</label>
                                <input type="text" formControlName="UserName" class="form-control dark-input"
                                    [value]="user.userName" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-light">Email</label>
                                <input type="email" formControlName="email" class="form-control dark-input"
                                    [value]="user.email" required>
                            </div>

                            <div class="d-grid mt-3">
                                <button type="submit" class="btn btn-gradient" data-bs-dismiss="modal">
                                    Save Changes
                                </button>
                            </div>

                        </form>
                    </div>

                    <div class="modal-footer border-0 pt-0">
                        <button class="btn btn-outline-light w-100" data-bs-dismiss="modal">
                            Cancel
                        </button>
                    </div>

                </div>
            </div>
        </div>
        <div class="box">
            <app-order *ngIf="!isAdmin()"></app-order>
        </div>
    </div>
