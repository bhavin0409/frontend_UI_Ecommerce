 <div class=" mt-5">

  <h3 class="fw-bold mb-4">Order Management 📦</h3>

  <div class="row mb-4 g-3">

  <div class="col-md-4">
    <input type="text"
           class="form-control"
           placeholder="Search by Order ID or Product"
           [(ngModel)]="searchTerm"
           (input)="applyFilters()" />
  </div>

  <div class="col-md-3">
    <select class="form-select"
            [(ngModel)]="selectedStatus"
            (change)="applyFilters()">
      <option value="">All Status</option>
      <option value="Pending">Pending</option>
      <option value="Delivered">Delivered</option>
      <option value="Cancelled">Cancelled</option>
    </select>
  </div>

  <div class="col-md-3">
    <select class="form-select"
            [(ngModel)]="sortOption"
            (change)="applyFilters()">
      <option value="">Sort By</option>
      <option value="date-desc">Latest First</option>
      <option value="date-asc">Oldest First</option>
      <option value="amount-desc">Price High → Low</option>
      <option value="amount-asc">Price Low → High</option>
    </select>
  </div>

  <div class="col-md-2">
    <button class="btn btn-secondary w-100"
            (click)="resetFilters()">
      Reset
    </button>
  </div>

</div>

  <div class="row g-4">

    <div class="col-lg-6" *ngFor="let order of filteredOrders">

      <div class="card shadow-lg border-0 rounded-4 p-3 order-card">

        <div class="d-flex justify-content-between align-items-center mb-2">
          <h5 class="fw-bold">Order#{{ order.id }}</h5>

          <span class="badge"
                [ngClass]="getStatusClass(order.status)">
            {{ order.status }}
          </span>
        </div>

        <small class="text-muted">
         {{ order.createdAt | date:'medium' }}
        </small>

        <div class="mt-2">
          <select class="form-select form-select-sm w-50"
                  (change)="updateStatus(order.id, $event)">
            <option disabled selected>Change Status</option>
            <option value="Pending">Pending</option>
            <option value="Delivered">Delivered</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>

        <div class="mt-3 box">

          <div *ngFor="let item of order.items"
               class="d-flex align-items-center mb-3 item-box">

            <img 
              [src]="'https://localhost:7225' + item.imageUrl"
              class="item-img me-3"
            />

            <div class="flex-grow-1">
              <h6 class="mb-1">
                {{ item.productName || ('Product #' + item.productId) }}
              </h6>

              <small class="text-muted">
                ₹{{ item.price }} × {{ item.quantity }}
              </small>
            </div>
             <small>₹{{item.price * item.quantity}}</small>
          </div>

        </div>

        <div class="d-flex justify-content-between align-items-center mt-1 border-top pt-2">
          <strong>Total:</strong>
          <h5 class="text-success">₹{{ order.totalAmount }}</h5>
        </div>

      </div>

    </div>

  </div>

</div>
