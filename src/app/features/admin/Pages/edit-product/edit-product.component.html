<div class="container-fluid mt-4">

    
    <a class="btn btn-light border shadow-sm px-4 py-1 mb-3 back-btn" routerLink="/admin/products">
        ← Back to Products
    </a>
  <div class="card shadow-lg border-0 rounded-4 p-4 edit-card">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h3 class="fw-bold gradient-text mb-0">
        ✏️ Edit Product
      </h3>

      <span class="badge bg-light text-dark px-3 py-2">
        Product ID: {{ productId }}
      </span>
    </div>

    <form [formGroup]="productForm" (ngSubmit)="updateProduct()">

      <div class="row g-4">

        <div class="col-md-6">
          <label class="form-label fw-semibold">Product Name</label>

          <input type="text" formControlName="name"
                 class="form-control custom-input"
                 placeholder="Enter product name"
                 [ngClass]="{'is-invalid': productForm.get('name')?.touched && productForm.get('name')?.invalid}">

          <div class="invalid-feedback">
            Name must be at least 3 characters
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Category</label>

          <select formControlName="categoryId"
                  class="form-select custom-input"
                  [ngClass]="{'is-invalid': productForm.get('categoryId')?.touched && productForm.get('categoryId')?.invalid}">

            <option value="">Select Category</option>
            <option [ngValue]="1">Electronics</option>
            <option [ngValue]="2">Clothing</option>
            <option [ngValue]="3">Books</option>
            <option [ngValue]="4">Home Appliances</option>
            <option [ngValue]="5">Sports</option>

          </select>

          <div class="invalid-feedback">
            Please select category
          </div>
        </div>

        <div class="col-md-12">
          <label class="form-label fw-semibold">Description</label>

          <textarea formControlName="description"
                    rows="7"
                    class="form-control custom-input"
                    placeholder="Enter product description..."
                    [ngClass]="{'is-invalid': productForm.get('description')?.touched && productForm.get('description')?.invalid}">
          </textarea>

          <div class="invalid-feedback">
            Minimum 10 characters required
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Price</label>

          <div class="input-group">
            <span class="input-group-text bg-light">₹</span>
            <input type="number" formControlName="price"
                   class="form-control custom-input"
                   placeholder="Enter price"
                   [ngClass]="{'is-invalid': productForm.get('price')?.touched && productForm.get('price')?.invalid}">
          </div>

          <div class="invalid-feedback d-block"
               *ngIf="productForm.get('price')?.touched && productForm.get('price')?.invalid">
            Price must be greater than 0
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Stock</label>

          <input type="number" formControlName="stock"
                 class="form-control custom-input"
                 placeholder="Available stock"
                 [ngClass]="{'is-invalid': productForm.get('stock')?.touched && productForm.get('stock')?.invalid}">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Product Image</label>

          <input type="file"
                 class="form-control custom-input"
                 (change)="onFileSelected($event)">
        </div>

        <div class="col-md-6 text-center" *ngIf="previewUrl">
          <div class="preview-box">
            <img [src]="previewUrl" class="img-fluid preview-img">
          </div>
        </div>

        <div class="col-md-12 text-end mt-3">

          <a routerLink="/admin/products"
             class="btn btn-outline-secondary me-2 px-4">
            Cancel
          </a>

          <button class="btn btn-primary px-4"
                  [disabled]="productForm.invalid || loading">

            <span *ngIf="!loading">🚀 Update Product</span>

            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
            <span *ngIf="loading">Updating...</span>

          </button>

        </div>

      </div>

    </form>

  </div>

</div>
